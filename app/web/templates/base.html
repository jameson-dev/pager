<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>{% block title %}Pager{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <a class="brand" href="/" aria-label="Pager — home">
      <!-- Broadcast/signal glyph: concentric arcs radiating from a point, the
           domain mark for a paging/dispatch feed. -->
      <svg class="brand-mark" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
        <circle cx="6" cy="18" r="2.1" fill="currentColor"></circle>
        <path d="M6 12.5a5.5 5.5 0 0 1 5.5 5.5" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round"></path>
        <path d="M6 7a11 11 0 0 1 11 11" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" opacity=".55"></path>
      </svg>
      <span class="brand-name">Pager</span>
    </a>
    <nav>
      <a href="/">Jobs</a>
      <a href="/layout">PDF Layout</a>
      <a href="/rules">Parsing Rules</a>
      <a href="/settings">Settings</a>
    </nav>
    <div class="status-pills">
      <div id="health-status" class="pill" title="Feed liveness"><span class="dot"></span>feed: …</div>
      <div id="print-status" class="pill"></div>
      <button id="theme-toggle" class="pill theme-toggle" type="button"
              title="Toggle light / dark" aria-label="Toggle light or dark theme">◐</button>
      <a id="logout-link" href="#" class="pill" style="display:none" title="Sign out">Sign out</a>
    </div>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script src="/static/common.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
